global:
  main_script: marble/main.py
  output_root: logs/pipeline_vllm
  temp_config_root: logs/pipeline_tmp_vllm
  model_keys:
    - llm
    - model
    - model_name
    - evaluate_llm
  orchestration_key: coordinate_mode
  orchestration_modes:
    - star
    - graph
    - chain
    - tree
  env:
    # vLLM OpenAI-compatible server endpoint.
    OPENAI_API_BASE: http://127.0.0.1:8000/v1
    # Common placeholder value for local OpenAI-compatible servers.
    OPENAI_API_KEY: EMPTY

# Optional per-model vLLM serve overrides used in managed mode.
# Keys can be either `openai/<hf_repo_id>` or raw `<hf_repo_id>`.
# `extra_args` are merged after CLI `--vllm-extra-args` and can include
# parser/tool-calling flags for models that need them.
vllm_model_overrides:
  openai/Qwen/Qwen3.5-0.8B:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/Qwen/Qwen3.5-2B:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/Qwen/Qwen3.5-4B:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/Qwen/Qwen3.5-9B:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/Qwen/Qwen3.5-27B:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/Qwen/Qwen3.5-35B-A3B:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/Qwen/Qwen2.5-72B-Instruct-AWQ:
    extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_xml"
  openai/mistralai/Ministral-3-3B-Reasoning-2512:
    extra_args: "--enable-auto-tool-choice --tool-call-parser mistral"
  openai/mistralai/Ministral-3-8B-Reasoning-2512:
    extra_args: "--enable-auto-tool-choice --tool-call-parser mistral"

model_sets:
  tiny:
    description: "Tiny local models (0.8B-3B)"
    models:
      - openai/Qwen/Qwen3.5-0.8B
      - openai/Qwen/Qwen3.5-2B
      - openai/Nanbeige/Nanbeige4.1-3B
      - openai/mistralai/Ministral-3-3B-Reasoning-2512
      - openai/RedHatAI/gemma-3-1b-it-quantized.w8a8

  small:
    description: "Small local models for faster iterations (4B-9B)"
    models:
      - openai/Qwen/Qwen3.5-4B
      - openai/tiiuae/Falcon-H1R-7B-FP8
      - openai/mistralai/Ministral-3-8B-Reasoning-2512
      - openai/Qwen/Qwen3.5-9B
      - openai/nvidia/NVIDIA-Nemotron-Nano-9B-v2

  medium:
    description: "Medium local models for stronger quality (20B-35B)"
    models:
      - openai/openai/gpt-oss-20b
      - openai/Qwen/Qwen3.5-27B
      - openai/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      - openai/deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
      - openai/Qwen/Qwen3.5-35B-A3B

  large:
    description: "Large local models for strongest quality "
    models:
      - openai/RedHatAI/DeepSeek-R1-Distill-Llama-70B-FP8-dynamic
      - openai/RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
      - openai/Qwen/Qwen2.5-72B-Instruct-AWQ
      - openai/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      - openai/openai/gpt-oss-120b

scenarios:
  research:
    configs:
      - marble/configs/test_config_research/*.yaml
    max_configs: 1

  minecraft:
    required_commands:
      - node
      - npm
    required_node_major: 22
    configs:
      - marble/configs/test_config_minecraft/*.yaml
    max_configs: 1

  database:
    required_commands:
      - docker
    configs:
      - marble/configs/test_config_database/*.yaml
    max_configs: 1

  coding:
    configs:
      - marble/configs/coding_configs/*.yaml
    max_configs: 1

  bargaining:
    configs:
      - marble/configs/test_config_world/test_config_world.yaml
    max_configs: 1

  werewolf:
    configs:
      - marble/configs/test_config/werewolf_config/werewolf_config.yaml
    max_configs: 1
